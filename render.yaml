services:
  # ─── Backend API ───────────────────────────────────────────────
  - type: web
    name: xeno-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    branch: master
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CHANNEL_SERVICE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # ─── Channel Service ──────────────────────────────────────────
  - type: web
    name: xeno-channel-service
    runtime: docker
    dockerfilePath: ./channel-service/Dockerfile
    dockerContext: ./channel-service
    region: oregon
    plan: free
    branch: master
    healthCheckPath: /health
